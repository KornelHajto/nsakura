name: ci

on:
  push:

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: nsakura-linux-amd64
            artifact_path: dist/nsakura
            build_script: |
              sudo apt-get update
              sudo apt-get install -y nim
              nimble install -y illwill
              mkdir -p dist
              nim c -d:release --out:dist/nsakura src/nsakura.nim
          - os: macos-latest
            artifact_name: nsakura-macos-universal
            artifact_path: dist/nsakura
            build_script: |
              brew update
              brew install nim
              nimble install -y illwill
              mkdir -p dist
              nim c -d:release --cpu:amd64 --passC:"-arch x86_64" --passL:"-arch x86_64" --out:dist/nsakura-amd64 src/nsakura.nim
              nim c -d:release --cpu:arm64 --passC:"-arch arm64" --passL:"-arch arm64" --out:dist/nsakura-arm64 src/nsakura.nim
              lipo -create dist/nsakura-amd64 dist/nsakura-arm64 -output dist/nsakura
              lipo -info dist/nsakura
          - os: windows-latest
            artifact_name: nsakura-windows-amd64
            artifact_path: dist/nsakura.exe
            setup_nim: true
            build_script: |
              nimble install -y illwill
              New-Item -ItemType Directory -Force dist | Out-Null
              nim c -d:release --out:dist/nsakura.exe src/nsakura.nim

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Nim
        if: matrix.os == 'windows-latest'
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: "2.2.10"

      - name: Build (bash)
        if: runner.os != 'Windows'
        shell: bash
        run: ${{ matrix.build_script }}

      - name: Build (pwsh)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ${{ matrix.build_script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 90
