name: ci

on:
  push:

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: nsakura-linux-amd64
            artifact_path: dist/nsakura
            build_script: |
              sudo apt-get update
              sudo apt-get install -y nim
              nimble install -y illwill
              mkdir -p dist
              nim c -d:release --out:dist/nsakura src/nsakura.nim
          - os: macos-latest
            artifact_name: nsakura-macos-arm64
            artifact_path: dist/nsakura
            build_script: |
              brew update
              brew install nim
              nimble install -y illwill
              mkdir -p dist
              nim c -d:release --out:dist/nsakura src/nsakura.nim
          - os: macos-13
            artifact_name: nsakura-macos-amd64
            artifact_path: dist/nsakura
            build_script: |
              brew update
              brew install nim
              nimble install -y illwill
              mkdir -p dist
              nim c -d:release --out:dist/nsakura src/nsakura.nim
          - os: windows-latest
            artifact_name: nsakura-windows-amd64
            artifact_path: dist/nsakura.exe
            setup_nim: true
            build_script: |
              nimble install -y illwill
              New-Item -ItemType Directory -Force dist | Out-Null
              nim c -d:release --out:dist/nsakura.exe src/nsakura.nim

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Nim
        if: matrix.os == 'windows-latest'
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: "2.2.10"

      - name: Build (bash)
        if: runner.os != 'Windows'
        shell: bash
        run: ${{ matrix.build_script }}

      - name: Build (pwsh)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ${{ matrix.build_script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 90

  macos-universal:
    name: build (macos-universal)
    runs-on: macos-latest
    needs: build
    steps:
      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: nsakura-macos-arm64
          path: dist/arm64

      - name: Download amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: nsakura-macos-amd64
          path: dist/amd64

      - name: Create universal binary
        shell: bash
        run: |
          mkdir -p dist/universal
          lipo -create dist/arm64/nsakura dist/amd64/nsakura -output dist/universal/nsakura
          lipo -info dist/universal/nsakura

      - name: Upload universal artifact
        uses: actions/upload-artifact@v4
        with:
          name: nsakura-macos-universal
          path: dist/universal/nsakura
          retention-days: 90
