name: ci

on:
  push:

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: nsakura-linux-amd64
            artifact_path: dist/nsakura
            build_script: |
              docker run --rm -v "${{ github.workspace }}:/workspace" -w /workspace nimlang/nim:2.2.10-alpine sh -c "apk add --no-cache build-base musl-dev && nimble install -y illwill && mkdir -p dist && nim c -d:release --passL:'-static' --passL:'-s' --out:dist/nsakura src/nsakura.nim"
          - os: macos-latest
            artifact_name: nsakura-macos-arm64
            artifact_path: dist/nsakura
            setup_nim: true
            shell: bash
            build_script: |
              nimble install -y illwill
              mkdir -p dist
              nim c -d:release --out:dist/nsakura src/nsakura.nim
          - os: macos-13
            artifact_name: nsakura-macos-amd64
            artifact_path: dist/nsakura
            setup_nim: true
            shell: bash
            build_script: |
              nimble install -y illwill
              mkdir -p dist
              nim c -d:release --out:dist/nsakura src/nsakura.nim
          - os: windows-latest
            artifact_name: nsakura-windows-amd64
            artifact_path: dist/nsakura.exe
            setup_nim: true
            shell: pwsh
            build_script: |
              nimble install -y illwill
              New-Item -ItemType Directory -Force dist | Out-Null
              nim c -d:release --out:dist/nsakura.exe src/nsakura.nim

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Nim
        if: matrix.setup_nim == true
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: "2.2.10"

      - name: Build
        shell: ${{ matrix.shell || 'bash' }}
        run: ${{ matrix.build_script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 90
